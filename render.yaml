services:
  # ──────────────────────────────────────────────
  # Web Service — Laravel + Docker
  # ──────────────────────────────────────────────
  - type: web
    name: autoscan-web
    plan: starter
    region: ohio
    repo: https://github.com/alerengellugo-coder/autoscan.git
    branch: main
    dockerContext: .
    dockerfilePath: ./Dockerfile

    envVars:
      - key: APP_NAME
        value: AutoScan
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: base64:a/e0sklcgi5X8o12HD8YGPzGc5XDdQftAR8BlAQuSaM=
      - key: APP_URL
        value: https://autoscan-web.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: ep-dark-cloud-aq2rrffa.c-8.us-east-1.aws.neon.tech
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: neondb
      - key: DB_USERNAME
        value: neondb_owner
      - key: DB_PASSWORD
        value: npg_n9UxutQPM7JL
      - key: DB_SSLMODE
        value: require
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: noreply@autoscan.com
      - key: MAIL_FROM_NAME
        value: "AutoScan Taller"

  # ──────────────────────────────────────────────
  # Background Worker — Queue Processing
  # ──────────────────────────────────────────────
  - type: worker
    name: autoscan-queue
    plan: starter
    region: ohio
    repo: https://github.com/alerengellugo-coder/autoscan.git
    branch: main
    dockerContext: .
    dockerfilePath: ./Dockerfile
    startCommand: "php artisan queue:work --sleep=3 --tries=3 --max-time=3600"

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:a/e0sklcgi5X8o12HD8YGPzGc5XDdQftAR8BlAQuSaM=
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: ep-dark-cloud-aq2rrffa.c-8.us-east-1.aws.neon.tech
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: neondb
      - key: DB_USERNAME
        value: neondb_owner
      - key: DB_PASSWORD
        value: npg_n9UxutQPM7JL
      - key: DB_SSLMODE
        value: require
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: database
